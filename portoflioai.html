<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Section</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f5f7fa;
    padding: 50px 20px;
}

/* Portfolio Section */
.portfolio-section {
    text-align: center;
    max-width: 1200px;
    margin: auto;
}

/* Section Title */
.section-title {
    font-size: 2.5rem;
    font-weight: 700;
    margin-bottom: 50px;
    color: #0d6efd;
}

/* Portfolio Box */
.portfolio-box {
    background: linear-gradient(135deg, #0d6efd, #6610f2);
    color: white;
    border-radius: 15px;
    padding: 60px 20px;
    margin: 20px 0;
    transition: transform 0.3s, box-shadow 0.3s;
    cursor: pointer;
}

.portfolio-box:hover {
    transform: translateY(-10px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* Portfolio Title inside Box */
.portfolio-box h3 {
    font-size: 1.8rem;
    font-weight: 600;
}

/* Responsive */
@media (min-width: 768px) {
    .portfolio-box {
        margin: 20px;
    }
}
</style>
</head>
<body>

<section class="portfolio-section">
    <h2 class="section-title"> Portfolio</h2>

    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-3">
            <div class="portfolio-box">
                <h3>Portfolio 1</h3>
            </div>
        </div>
        <div class="col-md-5 col-lg-3">
            <div class="portfolio-box">
                <h3>Portfolio 2</h3>
            </div>
        </div>
        <div class="col-md-5 col-lg-3">
            <div class="portfolio-box">
                <h3>Portfolio 3</h3>
            </div>
        </div>
        <div class="col-md-5 col-lg-3">
            <div class="portfolio-box">
                <h3>Portfolio 4</h3>
            </div>
        </div>
    </div>
</section>

</body>
</html>
